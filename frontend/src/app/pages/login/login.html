<div class="login-box">

  <h2>Login</h2>

  <input
    [(ngModel)]="username"
    placeholder="Username"
    name="username"
  >

  <input
    [(ngModel)]="password"
    placeholder="Password"
    type="password"
    name="password"
  >

  <button type="button" (click)="login()">Login</button>

  <p *ngIf="error" class="error-text">{{ error }}</p>

</div>
