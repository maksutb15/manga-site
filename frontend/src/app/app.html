<header class="header">

  <div class="left">

    <div class="logo">
      <span class="m">M</span><span class="s">S</span>
    </div>

    <nav class="menu">
      <a routerLink="/">Home</a>
      <a routerLink="/catalog">Catalog</a>
      <a routerLink="/popular">Popular</a>
      <a routerLink="/genres">Genres</a>
      <a routerLink="/forum">Forum</a>
    
    </nav>

  </div>

  <div class="auth">

  <ng-container *ngIf="!isLoggedIn(); else logged">

    <a routerLink="/login" class="login">Login</a>
    <a routerLink="/register" class="register">Register</a>

  </ng-container>

  <ng-template #logged>

    <a routerLink="/profile" class="login">{{ getUsername() }}</a>
    <button class="register" (click)="logout()">Logout</button>

  </ng-template>

</div>

</header>

<router-outlet></router-outlet>
